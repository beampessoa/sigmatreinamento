<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Ativar cadastro · SIGMA TREINAMENTOS</title>
</head>

<body data-shell="portao" data-pagina="ativar">
  <div id="app"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  /* ── BOOT ──────────────────────────────────────────────────────────────────
     Se o sigmatr-ui.js não carregar, a página NÃO fica branca: ela grita.
     Também procura o arquivo em mais de um caminho — pasta rasa ou aninhada. */
  (function () {
    function panico(t, d, c) {
      document.body.innerHTML =
        '<div style="position:fixed;inset:0;background:#B91C1C;color:#fff;padding:26px;overflow:auto;'
        + 'font:15px/1.55 -apple-system,Segoe UI,sans-serif">'
        + '<h1 style="margin:0 0 10px;font-size:22px">Casca não carregou — ' + t + '</h1>'
        + '<p style="margin:0 0 12px">' + d + '</p>'
        + '<pre style="background:rgba(0,0,0,.28);padding:12px;border-radius:8px;font-size:12.5px;'
        + 'white-space:pre-wrap;margin:0">' + c + '</pre></div>';
      throw new Error('[boot] ' + t);
    }
    window.STBOOT = function (pagina) {
      var vias = ['sigmatr-ui.js', '../sigmatr-ui.js', '/sigmatr-ui.js'];
      (function tenta() {
        if (!vias.length) return panico(
          'sigmatr-ui.js não foi encontrado',
          'O HTML abriu, mas o arquivo da casca não está em nenhum dos caminhos procurados.',
          ['Estrutura esperada:', '  sigmatr-ui.js', '  login.html', '  ativar.html',
           '  shell.html', '  treinando/inicio.html', '',
           'E sirva por HTTP, não por file:// —', '  python3 -m http.server 8000',
           '  http://localhost:8000/login.html'].join('\n'));
        var s = document.createElement('script');
        s.src = vias.shift();
        s.onerror = tenta;
        s.onload = function () {
          if (!window.SigmaTR) return panico('sigmatr-ui.js carregou, mas não definiu SigmaTR',
            'O arquivo pode ter vindo truncado no download.', 'Baixe o sigmatr-ui.js de novo.');
          if (!window.supabase) return panico('supabase-js não carregou',
            'O CDN foi bloqueado (rede fechada ou offline). A casca precisa dele antes de montar.',
            '&lt;script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"&gt;&lt;/script&gt;');
          pagina();
        };
        document.head.appendChild(s);
      })();
    };
  })();
  </script>
  <script>
  STBOOT(async () => {
    await SigmaTR.init();
    const app = document.getElementById('app');

    let cpf = '', email = '', pessoa = null;
    const err = (m) => `<div class="st-erro-msg"><b>!</b><span>${SigmaTR.esc(m)}</span></div>`;

    /* dígito verificador — o banco também valida. Aqui é só para não gastar viagem. */
    function cpfValido(v){
      const d = String(v).replace(/\D/g,'');
      if (d.length !== 11 || /^(\d)\1{10}$/.test(d)) return false;
      const dv = (n) => {
        let s = 0;
        for (let i = 0; i < n; i++) s += +d[i] * (n + 1 - i);
        const r = (s * 10) % 11;
        return (r === 10 ? 0 : r) === +d[n];
      };
      return dv(9) && dv(10);
    }

    /* ── passo 1: CPF ──────────────────────────────────────────────────── */
    function passoCPF(msg = ''){
      app.innerHTML = SigmaTR.portao({
        titulo: 'Ativar seu cadastro',
        texto:  'Seu cadastro foi importado pelo RH. Confirme quem é você para vincular um e-mail.',
        miolo: `
          <div class="st-portao-passo">Passo 1 de 3</div>
          ${msg ? err(msg) : ''}
          <div class="st-campo">
            <label for="cpf">CPF</label>
            <input id="cpf" type="text" inputmode="numeric" autocomplete="off"
                   maxlength="14" placeholder="000.000.000-00" value="${SigmaTR.esc(cpf ? SigmaTR.fmt.cpf(cpf) : '')}">
            <small>Só é usado para encontrar seu cadastro. Não aparece no endereço da página.</small>
          </div>
          <button class="st-btn" id="ir">Continuar</button>`,
        pe: 'Já ativou? <a href="/login.html">Entrar</a>'
      });

      const campo = document.getElementById('cpf');
      campo.focus();
      campo.addEventListener('input', () => {
        const d = campo.value.replace(/\D/g,'').slice(0,11);
        campo.value = d.length === 11 ? SigmaTR.fmt.cpf(d) : d;
      });
      campo.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('ir').click(); });

      document.getElementById('ir').onclick = async (e) => {
        cpf = campo.value.replace(/\D/g,'');
        if (!cpfValido(cpf)) return passoCPF('Esse CPF não é válido. Confira os 11 dígitos.');

        e.target.classList.add('st-carregando'); e.target.textContent = 'Procurando…';
        try {
          // CPF vai no CORPO. Nunca em query string, nunca em log de acesso.
          pessoa = await SigmaTR.fn('ativar-consulta', { cpf }, { publico:true });
        } catch (x) {
          return passoCPF(x.status === 404
            ? 'Não encontramos esse CPF. Seu cadastro pode ainda não ter sido importado — procure o Controle da Qualidade.'
            : 'Não conseguimos consultar agora. Tente de novo em instantes.');
        }
        if (pessoa.ja_ativo) return passoCPF(
          'Esse CPF já tem cadastro ativo. Entre com o e-mail que você vinculou.');
        passoEmail();
      };
    }

    /* ── passo 2: e-mail ───────────────────────────────────────────────── */
    function passoEmail(msg = ''){
      app.innerHTML = SigmaTR.portao({
        titulo: 'Confirme e escolha seu e-mail',
        texto:  'Este e-mail será o seu acesso. Pode ser pessoal — é onde o código chega.',
        miolo: `
          <div class="st-portao-passo">Passo 2 de 3</div>
          ${msg ? err(msg) : ''}
          <div class="st-cartao" style="margin-bottom:14px;padding:12px 14px">
            <div style="font-size:15px;font-weight:700">${SigmaTR.esc(pessoa.nome)}</div>
            <div style="font-size:12.5px;color:#6B7280;margin-top:2px">
              ${SigmaTR.esc(pessoa.funcao || 'Função a definir')} ·
              <span style="font-family:ui-monospace,monospace">${SigmaTR.fmt.cpfParcial(cpf)}</span>
            </div>
          </div>
          <div class="st-campo">
            <label for="em">Seu e-mail</label>
            <input id="em" type="email" inputmode="email" autocomplete="email"
                   autocapitalize="off" spellcheck="false" placeholder="voce@empresa.com.br">
          </div>
          <button class="st-btn" id="ir">Enviar código</button>`,
        pe: '<button class="st-elo" id="voltar">Não sou eu</button>'
      });

      const campo = document.getElementById('em');
      campo.focus();
      campo.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('ir').click(); });
      document.getElementById('voltar').onclick = () => { pessoa = null; passoCPF(); };

      document.getElementById('ir').onclick = async (e) => {
        email = campo.value.trim().toLowerCase();
        if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) return passoEmail('E-mail inválido. Confira e tente de novo.');

        e.target.classList.add('st-carregando'); e.target.textContent = 'Enviando…';
        try {
          // o serverless cria o usuário com app_metadata.roles.sigmatr = 'treinando'
          // e dispara o OTP. O papel nunca é decidido pelo cliente.
          await SigmaTR.fn('ativar', { cpf, email }, { publico:true });
        } catch (x) {
          return passoEmail(x.status === 409
            ? 'Esse e-mail já está em uso por outro cadastro. Use outro.'
            : 'Não conseguimos enviar o código agora. Tente de novo em instantes.');
        }
        passoCodigo();
      };
    }

    /* ── passo 3: código ───────────────────────────────────────────────── */
    function passoCodigo(msg = ''){
      app.innerHTML = SigmaTR.portao({
        titulo: 'Digite o código',
        texto:  `Enviamos 6 dígitos para ${email}. O código vale por 1 hora.`,
        miolo: `
          <div class="st-portao-passo">Passo 3 de 3</div>
          ${msg ? err(msg) : ''}
          <div class="st-campo st-codigo">
            <label for="cd">Código</label>
            <input id="cd" type="text" inputmode="numeric" autocomplete="one-time-code"
                   maxlength="6" pattern="[0-9]*" placeholder="000000">
          </div>
          <button class="st-btn" id="ir">Ativar e entrar</button>`,
        pe: '<button class="st-elo" id="voltar">Trocar o e-mail</button>'
      });

      const campo = document.getElementById('cd');
      campo.focus();
      campo.addEventListener('input', () => {
        campo.value = campo.value.replace(/\D/g,'').slice(0,6);
        if (campo.value.length === 6) document.getElementById('ir').click();
      });
      document.getElementById('voltar').onclick = () => passoEmail();

      document.getElementById('ir').onclick = async (e) => {
        const codigo = campo.value.trim();
        if (codigo.length !== 6) return passoCodigo('O código tem 6 dígitos.');
        e.target.classList.add('st-carregando'); e.target.textContent = 'Ativando…';

        const { data, error } = await SigmaTR.auth.confirmarCodigo(email, codigo);
        if (error) return passoCodigo('Código incorreto ou expirado. Peça um novo.');

        const p = SigmaTR.papel(data.session);
        if (!p) return passoCodigo(
          'Cadastro ativado, mas o acesso ainda não foi liberado. Fale com o Controle da Qualidade.');

        location.replace(SigmaTR.rotaPorPapel(p));
      };
    }

    passoCPF();
  });
  </script>
</body>
</html>
