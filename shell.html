<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>SIGMA TREINAMENTOS — casca</title>
</head>

<!-- A página declara DUAS coisas: a superfície e o ponto de montagem. Nada mais.
     Nenhuma classe st-. Nenhum grid. Nenhum header escrito à mão. -->
<body data-shell="painel" data-pagina="aderencia">

  <div id="app"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  /* ── BOOT ──────────────────────────────────────────────────────────────────
     Se o sigmatr-ui.js não carregar, a página NÃO fica branca: ela grita.
     Também procura o arquivo em mais de um caminho — pasta rasa ou aninhada. */
  (function () {
    function panico(t, d, c) {
      document.body.innerHTML =
        '<div style="position:fixed;inset:0;background:#B91C1C;color:#fff;padding:26px;overflow:auto;'
        + 'font:15px/1.55 -apple-system,Segoe UI,sans-serif">'
        + '<h1 style="margin:0 0 10px;font-size:22px">Casca não carregou — ' + t + '</h1>'
        + '<p style="margin:0 0 12px">' + d + '</p>'
        + '<pre style="background:rgba(0,0,0,.28);padding:12px;border-radius:8px;font-size:12.5px;'
        + 'white-space:pre-wrap;margin:0">' + c + '</pre></div>';
      throw new Error('[boot] ' + t);
    }
    window.STBOOT = function (pagina) {
      var vias = ['sigmatr-ui.js', '../sigmatr-ui.js', '/sigmatr-ui.js'];
      (function tenta() {
        if (!vias.length) return panico(
          'sigmatr-ui.js não foi encontrado',
          'O HTML abriu, mas o arquivo da casca não está em nenhum dos caminhos procurados.',
          ['Estrutura esperada:', '  sigmatr-ui.js', '  login.html', '  ativar.html',
           '  shell.html', '  treinando/inicio.html', '',
           'E sirva por HTTP, não por file:// —', '  python3 -m http.server 8000',
           '  http://localhost:8000/login.html'].join('\n'));
        var s = document.createElement('script');
        s.src = vias.shift();
        s.onerror = tenta;
        s.onload = function () {
          if (!window.SigmaTR) return panico('sigmatr-ui.js carregou, mas não definiu SigmaTR',
            'O arquivo pode ter vindo truncado no download.', 'Baixe o sigmatr-ui.js de novo.');
          if (!window.supabase) return panico('supabase-js não carregou',
            'O CDN foi bloqueado (rede fechada ou offline). A casca precisa dele antes de montar.',
            '&lt;script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"&gt;&lt;/script&gt;');
          pagina();
        };
        document.head.appendChild(s);
      })();
    };
  })();
  </script>
  <script>
  /* ─── banco de provas: qual superfície montar ────────────────────────────
     ?s=painel | frente | verificacao  ·  acrescente &debug para a auditoria    */
  const S = new URLSearchParams(location.search).get('s') || 'painel';
  document.body.dataset.shell = S;

  const DEMO_TRILHO = {
    funcao: 'Soldador · TIG/Eletrodo revestido',
    itens: [
      { titulo:'Integração REDUC',            status:'apto' },
      { titulo:'NR-35 Trabalho em altura',    status:'apto' },
      { titulo:'NR-33 Espaço confinado',      status:'apto' },
      { titulo:'PR-SOL-004 Soldagem',         status:'nunca_fez', agora:true },
      { titulo:'Permissão de Trabalho',       status:'nunca_fez' },
      { titulo:'Bloqueio e etiquetagem',      status:'nunca_fez' }
    ]
  };

  const DEMO_FICHA = {
    nome:'José Carlos de Almeida', funcao:'Soldador', matricula:'GCB-04821',
    status:'apto',
    procedimento_codigo:'PR-SOL-004', revisao:'03', publicado_em:'2026-05-18',
    emitido_por:'Controle da Qualidade · GCB',
    treinamentos:[
      { titulo:'Integração REDUC',         status:'apto' },
      { titulo:'NR-35 Trabalho em altura', status:'apto' },
      { titulo:'NR-33 Espaço confinado',   status:'apto' },
      { titulo:'PR-SOL-004 Soldagem',      status:'apto' }
    ]
  };

  STBOOT(async () => {
    await SigmaTR.init({
      demo: true,                               // não fala com o banco nesta página
      superficie: S,
      titulo:    S === 'painel' ? 'Aderência por função' : 'Sua liberação para a área',
      subtitulo: 'GCB Manutenção Industrial · Contrato SAP 4600686554',
      nome:      S === 'painel' ? 'Ana Ribeiro' : 'José Carlos de Almeida',
      perfil:    S === 'painel' ? 'Controle da Qualidade' : 'Soldador'
    });

    const app = document.getElementById('app');

    /* ── PAINEL (admin, desktop) ───────────────────────────────────────── */
    if (S === 'painel') {
      app.innerHTML = `
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:18px">
          <div class="st-cartao">
            <div style="font-size:11px;font-weight:700;letter-spacing:.8px;color:#9CA3AF;text-transform:uppercase">Aptos hoje</div>
            <div style="font-size:30px;font-weight:800;margin:6px 0 2px">112</div>
            <div style="font-size:12.5px;color:#6B7280">de 137 pessoas ativas</div>
          </div>
          <div class="st-cartao">
            <div style="font-size:11px;font-weight:700;letter-spacing:.8px;color:#9CA3AF;text-transform:uppercase">Vencendo em 30 dias</div>
            <div style="font-size:30px;font-weight:800;margin:6px 0 2px;color:#B45309">9</div>
            <div style="font-size:12.5px;color:#6B7280">3 estão mobilizadas</div>
          </div>
          <div class="st-cartao">
            <div style="font-size:11px;font-weight:700;letter-spacing:.8px;color:#9CA3AF;text-transform:uppercase">Bloqueando mobilização</div>
            <div style="font-size:30px;font-weight:800;margin:6px 0 2px;color:#B91C1C">4</div>
            <div style="font-size:12.5px;color:#6B7280">revisão nova sem carência</div>
          </div>
        </div>

        <div class="st-cartao" style="padding:0;overflow:hidden">
          <div style="padding:14px 16px;border-bottom:1px solid #E5E7EB;font-weight:700;font-size:14px">Pessoas</div>
          <table style="width:100%;border-collapse:collapse;font-size:13.5px">
            <tbody>
              <tr style="border-bottom:1px solid #F3F4F6">
                <td style="padding:11px 16px;font-weight:600">José Carlos de Almeida</td>
                <td style="padding:11px 16px;color:#6B7280;font-family:ui-monospace,monospace">${SigmaTR.fmt.cpfParcial('12345678901')}</td>
                <td style="padding:11px 16px;color:#6B7280">Soldador</td>
                <td style="padding:11px 16px">${SigmaTR.tarja('apto')}</td>
                <td style="padding:11px 16px">${SigmaTR.validade('2026-07-22')}</td>
              </tr>
              <tr style="border-bottom:1px solid #F3F4F6">
                <td style="padding:11px 16px;font-weight:600">Marcos Vinícius Prado</td>
                <td style="padding:11px 16px;color:#6B7280;font-family:ui-monospace,monospace">${SigmaTR.fmt.cpfParcial('98765432100')}</td>
                <td style="padding:11px 16px;color:#6B7280">Caldeireiro</td>
                <td style="padding:11px 16px">${SigmaTR.tarja('inapto_revisao')}</td>
                <td style="padding:11px 16px">${SigmaTR.validade('2026-06-02')}</td>
              </tr>
              <tr>
                <td style="padding:11px 16px;font-weight:600">Rafael Souza Lima</td>
                <td style="padding:11px 16px;color:#6B7280;font-family:ui-monospace,monospace">${SigmaTR.fmt.cpfParcial('11122233344')}</td>
                <td style="padding:11px 16px;color:#6B7280">Inspetor</td>
                <td style="padding:11px 16px">${SigmaTR.tarja('nunca_fez')}</td>
                <td style="padding:11px 16px"><span style="color:#9CA3AF;font-size:12.5px">—</span></td>
              </tr>
            </tbody>
          </table>
        </div>

        <div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap">
          <button class="st-btn" style="width:auto;padding:10px 16px" id="pub">Publicar revisão 04</button>
          <button class="st-btn st-btn--fantasma" style="width:auto;padding:10px 16px" id="pubCego">Publicar (impacto indisponível)</button>
        </div>

        ${SigmaTR.procedencia({ codigo:'PR-SOL-004', revisao:'03', publicado_em:'2026-05-18' })}
      `;

      document.getElementById('pub').onclick = async () => {
        const ok = await SigmaTR.confirmar({
          titulo:'Publicar a revisão 04 de PR-SOL-004?',
          texto:'Revisão publicada não se edita. Para corrigir, só uma revisão nova.',
          impacto:{ completo:true, afetados:87, mobilizados:14, carencia_dias:15 },
          acao:'Publicar revisão', perigo:true
        });
        SigmaTR.toast(ok ? 'Revisão 04 publicada. Carência de 15 dias gravada.' : 'Publicação cancelada.',
                      ok ? 'ok' : '');
      };
      document.getElementById('pubCego').onclick = async () => {
        await SigmaTR.confirmar({
          titulo:'Publicar a revisão 04 de PR-SOL-004?',
          texto:'Revisão publicada não se edita.',
          impacto:{ completo:false },        // zero e desconhecido não são a mesma coisa
          acao:'Publicar revisão', perigo:true
        });
      };
    }

    /* ── FRENTE (treinando, celular) ───────────────────────────────────── */
    if (S === 'frente') {
      app.innerHTML = `
        ${SigmaTR.trilho(DEMO_TRILHO)}
        ${SigmaTR.agora({
          olho:'Agora',
          titulo:'PR-SOL-004 · Soldagem em tubulação',
          texto:'12 minutos. Você precisa deste procedimento para ser liberado como soldador na parada.',
          acao:'Continuar de onde parou · 04:10',
          href:'player.html?r=demo'
        })}

        <div class="st-cartao" style="margin-bottom:14px">
          <div style="font-size:11px;font-weight:700;letter-spacing:.8px;color:#9CA3AF;text-transform:uppercase;margin-bottom:10px">Já liberados</div>
          <div style="display:flex;flex-direction:column;gap:9px">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
              <span style="font-size:14px;font-weight:600">Integração REDUC</span>${SigmaTR.tarja('apto')}
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
              <span style="font-size:14px;font-weight:600">NR-35 Trabalho em altura</span>${SigmaTR.validade('2026-07-22')}
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;gap:10px">
              <span style="font-size:14px;font-weight:600">NR-33 Espaço confinado</span>${SigmaTR.tarja('apto')}
            </div>
          </div>
        </div>

        ${SigmaTR.vazio({
          titulo:'Seu selo aparece aqui',
          texto:'Ao liberar todos os procedimentos da sua função, o selo é emitido com QR e validade de 24 meses.',
          acao:'Ver o que falta', href:'#'
        })}

        ${SigmaTR.procedencia({ codigo:'PR-SOL-004', revisao:'03', publicado_em:'2026-05-18' })}
      `;
      setTimeout(() => SigmaTR.sinalFraco(true), 1200);
      setTimeout(() => SigmaTR.sinalFraco(false), 5200);
    }


    /* ─── seletor de superfície: SÓ do banco de provas. Não existe em produção ── */
    const sw = document.createElement('div');
    sw.style.cssText = 'position:fixed;right:12px;bottom:12px;z-index:200;display:flex;gap:6px;'
      + 'background:#111827;padding:6px;border-radius:999px;box-shadow:0 6px 20px rgba(0,0,0,.3)';
    sw.innerHTML = ['painel','frente'].map(x =>
      `<a href="?s=${x}" style="padding:7px 13px;border-radius:999px;font:600 12px 'Exo 2',sans-serif;
        text-decoration:none;color:${x===S?'#fff':'#94A3B8'};background:${x===S?'#0F4CBA':'transparent'}">${x}</a>`
    ).join('');
    document.body.appendChild(sw);
  });
  </script>
</body>
</html>
